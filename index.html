<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommittedHB</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            <!-- background: linear-gradient(135deg, #003366, #0066cc); -->
            background: linear-gradient(135deg, #bdc3c7, #2c3e50);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .button {
            display: inline-block;
            padding: 14px 28px;
            background: white;
            color: #003366;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .button:hover {
            background: #f0f0f0;
        }
    </style>

    <script>
        // Redirect after 10 seconds
        setTimeout(function () {
            window.location.href = "https://ccbeachside.com";
        }, 10000);
    </script>
</head>
<body>

<div class="container">
    <h1>CommittedHB</h1>

    <p>
        Welcome to Committed Christian Fellowship of Huntington Beach!<br>
        You will be redirected to our Church "Calvary Chapel Beachside" website shortly.
    </p>

    <a class="button" href="https://ccbeachside.com">
        Go There Now
    </a>

</div>

</body>
</html>
